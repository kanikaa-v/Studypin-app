<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StudyPin — your study corkboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Kalam:wght@400;700&family=Nunito:wght@400;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="brand">
    <h1>StudyPin</h1>
    <span class="tagline">pin it. do it. pluck it off.</span>
  </div>
  <button class="add-subject-btn" onclick="openSubjectModal()">+ Add Subject</button>
</header>

<div class="tabs" id="tabsRow"></div>

<div class="board" id="board"></div>

<!-- ADD SUBJECT MODAL -->
<div class="modal-overlay hidden" id="subjectModal">
  <div class="modal">
    <h3>New subject</h3>
    <input type="text" id="subjectNameInput" placeholder="e.g. Physics, DBMS, Thesis..." maxlength="24">
    <div class="swatches" id="swatchRow"></div>
    <div class="modal-actions">
      <button style="background:transparent;color:var(--ink-soft);" onclick="closeSubjectModal()">Cancel</button>
      <button style="background:var(--ink);color:#fff;" onclick="createSubject()">Add</button>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
